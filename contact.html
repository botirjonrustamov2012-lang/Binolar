<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bog'lanish | Registratsiya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-blue: #00d2ff;
            --accent-purple: #92fe9d;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f0f0f url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #ccc;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav a.active, nav a:hover {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 15px var(--accent-blue);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .gender-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        button {
            margin-top: 10px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(58, 123, 213, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <h1>Savollaringiz bormi?</h1>
        <nav>
            <ul>
                <li><a href="index1.html">Asosiy</a></li>
                <li><a href="index2.html">Ma'lumotlar</a></li>
                <li><a href="index3.html">Galereya</a></li>
                <li><a href="#" class="active">Registraciya</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Xabar qoldiring</h2>
            <form>
                <input type="text" placeholder="Ismingiz (Majburiy)" required>
                <input type="text" placeholder="Familiyangiz">
                <input type="tel" placeholder="Telefon raqamingiz">
                <input type="text" placeholder="Manzilingiz">
                <input type="email" placeholder="Email manzilingiz" required>
                <textarea rows="4" placeholder="Qaysi binolar haqida ko'proq bilmoqchisiz?"></textarea>
                
                <div class="gender-box">
                    <span>Gender:</span>
                    <label><input type="radio" name="gender" value="male"> Erkak</label>
                    <label><input type="radio" name="gender" value="female"> Ayol</label>
                </div>

                <button type="submit">Xabarni yuborish 🚀</button>
            </form>
        </div>
    </main>

</body>
</html>
