<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogalereya | Arxitektura mo'jizalari</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #f39c12; 
            --bg-color: #0f0f0f;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: white;
        }

        header {
            background: rgba(0,0,0,0.8);
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0;
            margin-top: 15px;
        }

        nav a {
            text-decoration: none;
            color: #ccc;
            transition: 0.3s;
            font-weight: 500;
        }

        nav a.active, nav a:hover {
            color: var(--accent-color);
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .img-container {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            height: 250px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .img-container:hover img {
            transform: scale(1.1);
        }

        .img-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 15px;
            font-size: 0.9rem;
            opacity: 0;
            transition: 0.3s;
        }

        .img-container:hover .img-overlay {
            opacity: 1;
        }
        .video-section {
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        video {
            width: 100%;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Arxitektura Galereyasi</h1>
        <nav>
            <ul>
                <li><a href="index.html">Asosiy</a></li>
                <li><a href="about.html">Ma'lumotlar</a></li>
                <li><a href="#" class="active">Galereya</a></li>
                <li><a href="contact.html">Registraciya</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="gallery-grid">
            <div class="img-container">
                <img src="https://www.timeoutdubai.com/cloud/timeoutdubai/2021/09/11/928WN9rQ-Dubai-2.jpg" alt="Burj Khalifa">
                <div class="img-overlay">Burj Khalifa, Dubay</div>
            </div>
            <div class="img-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Kuala_Lumpur._Merdeka_118._2019-11-30_20-54-46.jpg/960px-Kuala_Lumpur._Merdeka_118._2019-11-30_20-54-46.jpg" alt="Merdeka 118">
                <div class="img-overlay">Merdeka 118, Kuala-Lumpur</div>
            </div>
            <div class="img-container">
                <img src="https://cdn.getyourguide.com/img/tour/b80a4db274287c92c59fc475511db066dae2760fdb7c4d8d425e35aef26f578b.jpg/vertical_520_780.jpg" alt="Shanghai Tower">
                <div class="img-overlay">Shanghai Tower, Xitoy</div>
            </div>
            <div class="img-container">
                <img src="https://i.pinimg.com/originals/e4/67/f5/e467f5b3986b20b85c72443ea25e6b6b.png?nii=t" alt="Makkah Royal Clock Tower">
                <div class="img-overlay">Makkah Royal Clock Tower</div>
            </div>
            <div class="img-container">
                <img src="https://images.adsttc.com/media/images/58d9/6ee3/e58e/cec1/a100/0194/large_jpg/PAFC_Overall_(c)PingAnFinanceCenter.jpg?1490644691" alt="Ping An Finance Center">
                <div class="img-overlay">Ping An Finance Center</div>
            </div>
            <div class="img-container">
                <img src="https://www.agoda.com/wp-content/uploads/2019/02/Lotte-World-Lotte-World-Tower.jpg" alt="Lotte World Tower">
                <div class="img-overlay">Lotte World Tower, Seul</div>
            </div>
        </div>

        <section class="video-section">
            <h2>🎥 Evolyutsiya Jarayoni</h2>
            <video controls>
                <source src="DUNYONING ENG BALAND OSMONO'PAR BINOLARNING EVOLYUTSIYASI 1901-2020 (1).mp4">
            </video>
        </section>
    </main>

</body>
</html>
